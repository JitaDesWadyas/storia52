    .initial-skeleton{display:grid;gap:22px;min-height:520px;padding:clamp(24px,5vw,54px);border-radius:24px;background:#fff9ee;border:1px solid #dccfb9;overflow:hidden}.initial-skeleton *{box-sizing:border-box}.initial-skeleton .sk{display:block;position:relative;overflow:hidden;background:#e7dcc9;border-radius:999px}.initial-skeleton .sk::after{content:"";position:absolute;inset:0;transform:translateX(-110%);background:linear-gradient(90deg,transparent,rgba(255,255,255,.62),transparent);animation:initialShimmer 1.35s ease-in-out infinite}.initial-skeleton-head{display:grid;gap:13px}.initial-skeleton-kicker{width:180px;height:12px}.initial-skeleton-title{width:min(650px,92%);height:56px;border-radius:16px!important}.initial-skeleton-copy{width:min(720px,100%);height:16px}.initial-skeleton-copy.short{width:min(470px,72%)}.initial-skeleton-card{display:grid;gap:12px;padding:22px;border:1px solid #e1d5c2;border-radius:18px;background:#f7efe2}.initial-skeleton-card .sk:nth-child(1){width:130px;height:10px}.initial-skeleton-card .sk:nth-child(2){width:min(420px,72%);height:28px;border-radius:10px}.initial-skeleton-card .sk:nth-child(3){width:100%;height:14px}.initial-skeleton-card .sk:nth-child(4){width:76%;height:14px}.initial-skeleton-actions{display:grid;grid-template-columns:1.2fr 1fr;gap:12px}.initial-skeleton-actions .sk{height:54px;border-radius:13px}.initial-skeleton-menu{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.initial-skeleton-menu .sk{height:88px;border-radius:15px}@keyframes initialShimmer{to{transform:translateX(110%)}}html[data-theme="dark"] .initial-skeleton{background:#17171b;border-color:#302c26}html[data-theme="dark"] .initial-skeleton .sk{background:#29282d}html[data-theme="dark"] .initial-skeleton-card{background:#1d1c21;border-color:#302c26}@media(max-width:680px){.initial-skeleton{min-height:500px;padding:24px 17px}.initial-skeleton-title{height:76px}.initial-skeleton-actions,.initial-skeleton-menu{grid-template-columns:1fr}.initial-skeleton-menu .sk{height:64px}}@media(prefers-reduced-motion:reduce){.initial-skeleton .sk::after{animation:none}}
    @media print{body{background:#fff!important}.site-header,.site-footer,.screen-heading,.game-main>:not(.story-summary),.game-side{display:none!important}.app-shell{width:100%;padding:0}.surface{padding:18mm;border:0;box-shadow:none}.game-layout{display:block}.story-summary{display:grid!important}.opening-box,.story-card{break-inside:avoid}}
