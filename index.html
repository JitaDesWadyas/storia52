<!doctype html>
<html lang="it" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#15120d">
  <meta name="description" content="STORIA 52, gioco narrativo con un mazzo di carte.">
  <title>STORIA 52</title>
  <script>(()=>{try{document.documentElement.dataset.theme=localStorage.getItem('storia52_theme')==='dark'?'dark':'light'}catch{}})();</script>
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="clean-app.css">
  <link rel="stylesheet" href="refine-flow.css">
  <style>.turn-grid{grid-template-columns:repeat(2,minmax(0,1fr))}@media(max-width:820px){.turn-grid{grid-template-columns:1fr}}@media print{body{background:#fff!important}.site-header,footer,.screen-heading,.game-main>:not(.story-summary),.game-side{display:none!important}.app-shell{width:100%;padding:0}.surface{padding:18mm;border:0;box-shadow:none}.game-layout{display:block}.story-summary{display:grid!important}.opening-box,.story-card{break-inside:avoid}}</style>
</head>
<body>
  <div class="app-shell">
    <header class="site-header">
      <div class="brand"><img src="storia52-cards-logo.svg" alt=""><h1>STORIA 52</h1></div>
      <div class="header-actions">
        <button type="button" id="headerRules" class="header-button" aria-label="Apri il regolamento"><span aria-hidden="true">☰</span><span>Regole</span></button>
        <button type="button" id="themeToggle" class="theme-toggle" aria-label="Passa al tema scuro" aria-pressed="false"><span class="theme-toggle-icon">◐</span><span class="theme-toggle-label">Tema</span></button>
        <button type="button" id="headerExit" class="header-button header-exit" hidden><span aria-hidden="true">×</span><span>Esci</span></button>
      </div>
    </header>
    <main>
      <section id="play" class="page active"></section>
    </main>
    <footer><span>STORIA 52</span><span>GIOCO NARRATIVO</span></footer>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
  <script src="ui-core.js"></script>
  <script src="ready-stories-data.js"></script>
  <script src="clean-core.js"></script>
  <script src="clean-rules.js"></script>
  <script src="clean-home.js"></script>
  <script src="clean-config.js"></script>
  <script src="clean-opening.js"></script>
  <script src="clean-stories-model.js"></script>
  <script src="ready-story-objectives.js"></script>
  <script src="clean-stories-markup.js"></script>
  <script src="clean-stories-view.js"></script>
  <script src="clean-objectives.js"></script>
  <script src="clean-prep.js"></script>
  <script src="clean-print.js"></script>
  <script src="clean-invite-host.js"></script>
  <script src="clean-invite-data.js"></script>
  <script src="clean-exit.js"></script>
  <script src="clean-init.js"></script>
</body>
</html>
