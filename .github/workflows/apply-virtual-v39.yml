name: Apply virtual cards v39

on:
  push:
    branches: [agent/virtual-cards-single-row-v39]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-v39:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/virtual-cards-single-row-v39
          fetch-depth: 1
          show-progress: false

      - name: Apply focused UI changes
        run: python scripts/apply-v39.py

      - name: Verify implementation
        shell: bash
        run: |
          node --check virtual-cards.js
          node scripts/release-check.mjs
          grep -q 'data-open-story' virtual-cards.js
          grep -q 'virtual-card-back-mark' virtual-cards.js
          grep -q 'flex-wrap:nowrap!important' virtual-cards.css
          grep -q 'virtual-cards.css?v=39' index.html
          python - <<'PY'
          for viewport in (360, 390, 412, 430):
              card = min(76, max(62, (viewport - 32) / 5))
              occupied = card * 5 + 4 * 4
              available = viewport - 16
              assert occupied <= available + 0.01, (viewport, occupied, available)
          print('Cinque carte entrano nelle viewport richieste.')
          PY

      - name: Commit final implementation
        shell: bash
        run: |
          rm -f .github/workflows/apply-virtual-v39.yml scripts/apply-v39.py scripts/v39-kick.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Compatta il tavolo e dispone la mano su una riga'
          git push origin HEAD:agent/virtual-cards-single-row-v39
