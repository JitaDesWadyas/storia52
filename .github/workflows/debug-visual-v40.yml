name: Debug visual mobile v40

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  debug-visual:
    if: github.head_ref == 'agent/virtual-cards-mobile-layout-v40'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Capture visual failure
        run: |
          if [ -f v40-visual-debug.txt ]; then exit 0; fi
          python - <<'PY'
          from pathlib import Path
          import re, subprocess
          source = Path('.github/workflows/rebuild-mobile-layout-v40.yml').read_text()
          def extract(name):
              match = re.search(rf'      - name: {re.escape(name)}\n        run: \|\n(.*?)(?=\n      - name: )', source, re.S)
              return '\n'.join(line[10:] if line.startswith('          ') else line for line in match.group(1).splitlines()) + '\n'
          script = extract('Rebuild mobile proportions')
          script = re.sub(r"\n\s*\('(shell-v39|runtime-v39|epoi_sw_reload_v39)'.*?\),", '', script)
          subprocess.run(['bash','-euxo','pipefail'],input=script,text=True,check=True)
          css=Path('virtual-cards.css').read_text().replace('grid-template-rows:auto auto minmax(0,1fr) auto auto 68px!important;','grid-template-rows:auto auto minmax(0,1fr) auto auto auto!important;')
          css=re.sub(r'(\.virtual-story-copy h3\{.*?-webkit-line-clamp:)4(!important;)',r'\g<1>2\2',css,count=1,flags=re.S)
          css=re.sub(r'(\.virtual-card-effect small\{.*?-webkit-line-clamp:)2(!important;)',r'\g<1>4\2',css,count=1,flags=re.S)
          Path('virtual-cards.css').write_text(css)
          subprocess.run(['bash','-euxo','pipefail'],input=extract('Build mobile visual harness'),text=True,check=True)
          PY
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
          set +e
          node verify-mobile-v40.mjs > v40-visual-debug.txt 2>&1
          echo "EXIT=$?" >> v40-visual-debug.txt
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add v40-visual-debug.txt
          git commit -m "chore: registra metriche layout mobile v40"
          git push origin HEAD:${{ github.head_ref }}
