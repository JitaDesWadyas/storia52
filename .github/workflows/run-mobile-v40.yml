name: Run mobile layout v40

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  mobile-v40:
    if: github.head_ref == 'agent/virtual-cards-mobile-layout-v40'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply prepared layout patch
        run: |
          python - <<'PY'
          from pathlib import Path
          import re, subprocess, textwrap
          source = Path('.github/workflows/rebuild-mobile-layout-v40.yml').read_text()
          def run_step(name):
              pattern = rf'      - name: {re.escape(name)}\n        run: \|\n(.*?)(?=\n      - name: )'
              match = re.search(pattern, source, re.S)
              if not match:
                  raise SystemExit(f'Cannot find prepared step: {name}')
              script = textwrap.dedent(match.group(1))
              subprocess.run(['bash', '-euxo', 'pipefail'], input=script, text=True, check=True)
          run_step('Rebuild mobile proportions')
          PY

      - name: Validate release
        run: node scripts/release-check.mjs

      - name: Build visual harness
        run: |
          python - <<'PY'
          from pathlib import Path
          import re, subprocess, textwrap
          source = Path('.github/workflows/rebuild-mobile-layout-v40.yml').read_text()
          pattern = r'      - name: Build mobile visual harness\n        run: \|\n(.*?)(?=\n      - name: )'
          match = re.search(pattern, source, re.S)
          if not match:
              raise SystemExit('Cannot find prepared visual harness')
          subprocess.run(['bash', '-euxo', 'pipefail'], input=textwrap.dedent(match.group(1)), text=True, check=True)
          PY

      - name: Install Chromium
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Verify mobile layout visually
        run: node verify-mobile-v40.mjs

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: virtual-mobile-v40-screenshots
          path: v40-screenshots
          retention-days: 14

      - name: Commit final layout
        run: |
          rm -f verify-mobile-v40.html verify-mobile-v40.mjs
          rm -f .github/workflows/rebuild-mobile-layout-v40.yml .github/workflows/run-mobile-v40.yml .github/workflows/bootstrap-mobile-v40.yml
          rm -f .github/v40-trigger.txt .github/v40-trigger-2.txt .github/v40-branch-note.txt .github/v40-branch-anchor.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: ricostruisce le proporzioni del tavolo mobile"
          git push origin HEAD:${{ github.head_ref }}
