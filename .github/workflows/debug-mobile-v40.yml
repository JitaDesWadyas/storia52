name: Debug mobile layout v40

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  debug-v40:
    if: github.head_ref == 'agent/virtual-cards-mobile-layout-v40'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Capture exact patch error
        run: |
          if [ -f v40-debug.txt ]; then exit 0; fi
          python - <<'PY'
          from pathlib import Path
          import re, subprocess, textwrap
          source = Path('.github/workflows/rebuild-mobile-layout-v40.yml').read_text()
          match = re.search(r'      - name: Rebuild mobile proportions\n        run: \|\n(.*?)(?=\n      - name: )', source, re.S)
          script = textwrap.dedent(match.group(1))
          script = re.sub(r"\n\s*\('(shell-v39|runtime-v39|epoi_sw_reload_v39)'.*?\),", '', script)
          result = subprocess.run(['bash', '-euxo', 'pipefail'], input=script, text=True, capture_output=True)
          Path('v40-debug.txt').write_text(f'EXIT={result.returncode}\n--- STDOUT ---\n{result.stdout}\n--- STDERR ---\n{result.stderr}\n')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add v40-debug.txt
          git commit -m "chore: registra errore patch mobile v40"
          git push origin HEAD:${{ github.head_ref }}
