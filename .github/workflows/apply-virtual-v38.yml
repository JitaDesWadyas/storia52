name: Apply virtual cards v38

on:
  push:
    branches:
      - agent/virtual-cards-mobile-polish-v2

permissions:
  contents: write

jobs:
  apply-v38:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/virtual-cards-mobile-polish-v2
          fetch-depth: 0
      - name: Apply verified patch
        shell: bash
        run: |
          cat <<'PATCH64' | base64 -d | gzip -d > scripts/apply-virtual-v38.py
          
          PATCH64
          python scripts/apply-virtual-v38.py
          node --check virtual-cards.js
          node scripts/release-check.mjs
      - name: Commit patched files and remove helper
        shell: bash
        run: |
          rm -f scripts/apply-virtual-v38.py .github/workflows/apply-virtual-v38.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Corregge drag, carte e indicazioni della modalità virtuale"
          git push origin HEAD:agent/virtual-cards-mobile-polish-v2
