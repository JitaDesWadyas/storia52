name: Run virtual cards v38

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-v38:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/virtual-cards-mobile-polish-v2
          fetch-depth: 0
      - name: Extract and apply patch
        shell: bash
        run: |
          awk '/PATCH64/{getline; print; exit}' .github/workflows/apply-virtual-v38.yml | base64 -d | gzip -d > scripts/apply-virtual-v38.py
          python scripts/apply-virtual-v38.py
          node --check virtual-cards.js
          node scripts/release-check.mjs
      - name: Commit final files
        shell: bash
        run: |
          rm -f scripts/apply-virtual-v38.py .github/workflows/apply-virtual-v38.yml .github/workflows/run-virtual-v38.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Corregge drag, carte e indicazioni della modalità virtuale"
          git push origin HEAD:agent/virtual-cards-mobile-polish-v2
