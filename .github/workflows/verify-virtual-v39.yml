name: Verify virtual cards v39

on:
  pull_request:
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  visual-v39:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/virtual-cards-single-row-v39
          fetch-depth: 1
          show-progress: false

      - name: Build representative harness
        shell: bash
        run: |
          cat > verify-v39.html <<'HTML'
          <!doctype html>
          <html lang="it" data-theme="light">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
            <link rel="stylesheet" href="virtual-cards.css?v=39">
            <style>
              *{box-sizing:border-box}html,body{margin:0}button{font:inherit}.primary{color:#211a12;background:#d99b18;border:1px solid #d99b18}.secondary{color:#241d15;background:#fffaf1;border:1px solid #c7b397}
              .test-modal{position:fixed;inset:0;z-index:20000;display:grid;place-items:center;background:rgba(0,0,0,.55)}.test-modal div{padding:24px;background:#fffaf1;border-radius:16px;font-weight:800}
            </style>
          </head>
          <body class="virtual-table-active">
            <div class="app-shell"><main><section id="play" class="page active">
              <section class="virtual-game" data-virtual-root data-phase="exchange">
                <header class="virtual-game-header"><div class="virtual-player-title"><img src="storia52-cards-logo.svg" alt="E POI?"><div class="virtual-player-copy"><p>Giocatore 1</p><h2><span>Turno 2</span></h2></div></div><div class="virtual-top-actions"><button class="virtual-icon-button virtual-menu-button"><span>Menu</span></button><button class="virtual-icon-button">◐</button><button class="virtual-icon-button">×</button></div></header>
                <ol class="virtual-turn-rail"><li class="current"><span>1</span><b>Cambia</b></li><li><span>2</span><b>Gioca</b></li><li><span>3</span><b>Chiudi</b></li></ol>
                <section class="virtual-table">
                  <button type="button" class="virtual-story-stage" data-open-story><span class="virtual-story-icon">●</span><div class="virtual-story-copy"><p>DRAMMA</p><h3>Primo giorno in Meridiana</h3><small>Samir comincia il suo primo giorno nello stabilimento Meridiana di Valma. Durante il turno, Marta gli mostra una lettera che cambia il significato del suo arrivo.</small></div><div class="virtual-party"><span class="virtual-party-person active">G1</span><span class="virtual-party-person">G2</span><span class="virtual-party-person">G3</span><span class="virtual-party-person">G4</span></div></button>
                  <div class="virtual-table-board"><button class="virtual-deck-card"><span class="virtual-deck-layer"></span><span class="virtual-deck-layer"></span><span class="virtual-deck-layer"></span><span class="virtual-deck-face"><img src="storia52-cards-logo.svg" alt=""><small>MAZZO</small></span></button><article class="virtual-card-focus has-card is-discarded"><span class="virtual-focus-label">CARTA SCARTATA</span><span class="virtual-table-card negative"><span class="virtual-card-corner"><b>J</b><i>♣</i></span><span class="virtual-card-symbol">♣</span><span class="virtual-card-effect"><em>NEGATIVA</em><b>Oggetto</b><small>Entra un oggetto problematico</small></span></span></article></div>
                </section>
                <div class="virtual-phase-callout"><b>CAMBIA UNA CARTA</b><span>Tocca per selezionarla oppure trascinala sul tavolo.</span></div>
                <section class="virtual-hand-section"><div class="virtual-hand-heading"><span>LA TUA MANO</span><div><b>5 carte</b><button type="button" data-toggle-cards>Nascondi</button></div></div><div class="virtual-hand" data-virtual-hand></div><button class="virtual-hand-cover" hidden></button><p class="virtual-gesture-hint">Tocco: seleziona. Trascinamento verso il tavolo: cambia subito.</p></section>
                <div class="virtual-actions" data-count="1"><button class="primary" disabled>Cambia</button></div>
              </section>
            </section></main></div>
            <script>
              const cards=[['3','♣','AZIONE','Azione','Un personaggio tenta un’azione',''],['6','♠','NEGATIVA','Ostacolo','Un ostacolo blocca o complica',''],['K','♣','NEGATIVA','Luogo','Entra un luogo pericoloso',''],['K','♦','POSITIVA','Luogo','Entra un luogo favorevole','red'],['8','♥','POSITIVA','Relazione','Una relazione si rafforza','red']];
              const hand=document.querySelector('[data-virtual-hand]');let hidden=false;
              function draw(){hand.innerHTML=cards.map(card=>hidden?`<button class="virtual-card-slot card-back"><span class="virtual-card-back-mark"><img src="storia52-cards-logo.svg" alt=""><small>E POI?</small></span></button>`:`<button class="virtual-card-slot ${card[5]}"><span class="virtual-card-corner"><b>${card[0]}</b><i>${card[1]}</i></span><span class="virtual-card-symbol">${card[1]}</span><span class="virtual-card-effect"><em>${card[2]}</em><b>${card[3]}</b><small>${card[4]}</small></span></button>`).join('');document.querySelector('[data-toggle-cards]').textContent=hidden?'Mostra':'Nascondi'}
              draw();document.querySelector('[data-toggle-cards]').onclick=()=>{hidden=!hidden;draw()};document.querySelector('[data-open-story]').onclick=()=>{document.body.insertAdjacentHTML('beforeend','<div class="test-modal" data-story-modal><div>Storia completa aperta</div></div>')};
            </script>
          </body></html>
          HTML

          cat > verify-v39.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs';
          fs.mkdirSync('v39-screenshots',{recursive:true});
          const browser=await chromium.launch({headless:true});
          const viewports=[[360,740],[360,800],[390,844],[412,915],[430,932]];
          for(const [width,height] of viewports){
            const page=await browser.newPage({viewport:{width,height}});
            await page.goto('http://127.0.0.1:4173/verify-v39.html',{waitUntil:'networkidle'});
            const result=await page.evaluate(()=>{
              const cards=[...document.querySelectorAll('.virtual-hand .virtual-card-slot')].map(el=>el.getBoundingClientRect());
              const table=document.querySelector('.virtual-table').getBoundingClientRect();
              const story=document.querySelector('.virtual-story-stage').getBoundingClientRect();
              const actions=document.querySelector('.virtual-actions').getBoundingClientRect();
              return {scrollWidth:document.documentElement.scrollWidth,scrollHeight:document.documentElement.scrollHeight,cards:cards.map(r=>({left:r.left,right:r.right,top:r.top,bottom:r.bottom,width:r.width})),table:{top:table.top,bottom:table.bottom,height:table.height},story:{height:story.height},actions:{top:actions.top,bottom:actions.bottom}};
            });
            if(result.scrollWidth>width||result.scrollHeight>height+1)throw new Error(`overflow ${width}x${height}: ${JSON.stringify(result)}`);
            if(result.cards.length!==5)throw new Error(`carte mancanti ${width}x${height}`);
            if(Math.max(...result.cards.map(c=>c.top))-Math.min(...result.cards.map(c=>c.top))>1)throw new Error(`mano non su una riga ${width}x${height}`);
            if(result.cards.some(c=>c.left<0||c.right>width+0.5))throw new Error(`carta fuori viewport ${width}x${height}`);
            if(result.table.height>441||result.table.height<173)throw new Error(`tavolo fuori misura ${width}x${height}: ${result.table.height}`);
            if(result.story.height<95)throw new Error(`incipit troppo piccolo ${width}x${height}`);
            if(result.actions.bottom>height+0.5)throw new Error(`azioni fuori viewport ${width}x${height}`);
            await page.click('[data-open-story]');
            if(await page.locator('[data-story-modal]').count()!==1)throw new Error('incipit non cliccabile');
            await page.screenshot({path:`v39-screenshots/${width}x${height}.png`,fullPage:false});
            await page.close();
          }
          const hiddenPage=await browser.newPage({viewport:{width:390,height:844}});await hiddenPage.goto('http://127.0.0.1:4173/verify-v39.html');await hiddenPage.click('[data-toggle-cards]');const backs=await hiddenPage.locator('.virtual-hand .card-back').count();if(backs!==5)throw new Error(`retri visibili: ${backs}`);await hiddenPage.screenshot({path:'v39-screenshots/390x844-hidden.png'});await hiddenPage.close();await browser.close();console.log('Verifica visuale v39 completata.');
          JS

      - name: Install browser
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.55.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null

      - name: Run mobile verification
        shell: bash
        run: |
          python3 -m http.server 4173 >/tmp/v39-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          sleep 2
          node verify-v39.mjs

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: virtual-cards-v39-screenshots
          path: v39-screenshots/*.png
          retention-days: 14

      - name: Remove temporary workflow
        shell: bash
        run: |
          rm -rf .github/workflows/verify-virtual-v39.yml verify-v39.html verify-v39.mjs v39-screenshots node_modules package.json package-lock.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Registra verifica visuale mobile v39'
          git push origin HEAD:agent/virtual-cards-single-row-v39
