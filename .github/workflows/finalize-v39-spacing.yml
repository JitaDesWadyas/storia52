name: Finalize virtual cards v39 spacing

on:
  pull_request:
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize-v39:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/virtual-cards-single-row-v39
          fetch-depth: 1
          show-progress: false

      - name: Apply spacing correction
        run: python scripts/apply-v39-spacing.py

      - name: Verify release
        run: |
          node --check virtual-cards.js
          node scripts/release-check.mjs

      - name: Build mobile harness
        shell: bash
        run: |
          cat > verify-v39-final.html <<'HTML'
          <!doctype html><html lang="it" data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><link rel="stylesheet" href="virtual-cards.css?v=39"><style>*{box-sizing:border-box}html,body{margin:0}button{font:inherit}.primary{color:#211a12;background:#d99b18;border:1px solid #d99b18}.test-modal{position:fixed;inset:0;z-index:20000;display:grid;place-items:center;background:rgba(0,0,0,.55)}.test-modal div{padding:24px;background:#fffaf1;border-radius:16px;font-weight:800}</style></head><body class="virtual-table-active"><div class="app-shell"><main><section id="play" class="page active"><section class="virtual-game" data-phase="exchange">
          <header class="virtual-game-header"><div class="virtual-player-title"><img src="storia52-cards-logo.svg" alt=""><div class="virtual-player-copy"><p>Giocatore 1</p><h2>Turno 2</h2></div></div><div class="virtual-top-actions"><button class="virtual-icon-button virtual-menu-button"><span>Menu</span></button><button class="virtual-icon-button">◐</button><button class="virtual-icon-button">×</button></div></header>
          <ol class="virtual-turn-rail"><li class="current"><span>1</span><b>Cambia</b></li><li><span>2</span><b>Gioca</b></li><li><span>3</span><b>Chiudi</b></li></ol>
          <section class="virtual-table"><button class="virtual-story-stage" data-open-story><span class="virtual-story-icon">●</span><div class="virtual-story-copy"><p>DRAMMA</p><h3>Primo giorno in Meridiana</h3><small>Samir comincia il suo primo giorno nello stabilimento Meridiana di Valma. Durante il turno, Marta gli mostra una lettera che cambia il significato del suo arrivo.</small></div><div class="virtual-party"><span class="virtual-party-person active">G1</span><span class="virtual-party-person">G2</span><span class="virtual-party-person">G3</span><span class="virtual-party-person">G4</span></div></button><div class="virtual-table-board"><button class="virtual-deck-card"><span class="virtual-deck-layer"></span><span class="virtual-deck-layer"></span><span class="virtual-deck-layer"></span><span class="virtual-deck-face"><img src="storia52-cards-logo.svg" alt=""><small>MAZZO</small></span></button><article class="virtual-card-focus has-card is-discarded"><span class="virtual-focus-label">CARTA SCARTATA</span><span class="virtual-table-card negative"><span class="virtual-card-corner"><b>J</b><i>♣</i></span><span class="virtual-card-symbol">♣</span><span class="virtual-card-effect"><em>NEGATIVA</em><b>Oggetto</b><small>Entra un oggetto problematico</small></span></span></article></div></section>
          <div class="virtual-phase-callout"><b>CAMBIA UNA CARTA</b><span>Tocca per selezionarla oppure trascinala sul tavolo.</span></div>
          <section class="virtual-hand-section"><div class="virtual-hand-heading"><span>LA TUA MANO</span><div><b>5 carte</b><button data-toggle-cards>Nascondi</button></div></div><div class="virtual-hand" data-hand></div><button class="virtual-hand-cover" hidden></button><p class="virtual-gesture-hint">Tocco: seleziona. Trascinamento verso il tavolo: cambia subito.</p></section>
          <div class="virtual-actions" data-count="1"><button class="primary" disabled>Cambia</button></div></section></section></main></div><script>
          const cards=[['3','♣','AZIONE','Azione','Un personaggio tenta un’azione',''],['6','♠','NEGATIVA','Ostacolo','Un ostacolo blocca o complica',''],['K','♣','NEGATIVA','Luogo','Entra un luogo pericoloso',''],['K','♦','POSITIVA','Luogo','Entra un luogo favorevole','red'],['8','♥','POSITIVA','Relazione','Una relazione si rafforza','red']];const hand=document.querySelector('[data-hand]');let hidden=false;function draw(){hand.innerHTML=cards.map(c=>hidden?`<button class="virtual-card-slot card-back"><span class="virtual-card-back-mark"><img src="storia52-cards-logo.svg" alt=""><small>E POI?</small></span></button>`:`<button class="virtual-card-slot ${c[5]}"><span class="virtual-card-corner"><b>${c[0]}</b><i>${c[1]}</i></span><span class="virtual-card-symbol">${c[1]}</span><span class="virtual-card-effect"><em>${c[2]}</em><b>${c[3]}</b><small>${c[4]}</small></span></button>`).join('');document.querySelector('[data-toggle-cards]').textContent=hidden?'Mostra':'Nascondi'}draw();document.querySelector('[data-toggle-cards]').onclick=()=>{hidden=!hidden;draw()};document.querySelector('[data-open-story]').onclick=()=>document.body.insertAdjacentHTML('beforeend','<div class="test-modal" data-story-modal><div>Storia completa aperta</div></div>');
          </script></body></html>
          HTML

          cat > verify-v39-final.mjs <<'JS'
          import { chromium } from 'playwright';import fs from 'node:fs';fs.mkdirSync('v39-final-shots',{recursive:true});const browser=await chromium.launch({headless:true});for(const [width,height] of [[360,740],[360,800],[390,844],[412,915],[430,932]]){const page=await browser.newPage({viewport:{width,height}});await page.goto('http://127.0.0.1:4173/verify-v39-final.html',{waitUntil:'networkidle'});const r=await page.evaluate(()=>{const q=s=>document.querySelector(s).getBoundingClientRect(),cards=[...document.querySelectorAll('.virtual-hand .virtual-card-slot')].map(e=>e.getBoundingClientRect());return{sw:document.documentElement.scrollWidth,sh:document.documentElement.scrollHeight,table:q('.virtual-table'),phase:q('.virtual-phase-callout'),hand:q('.virtual-hand-section'),actions:q('.virtual-actions'),story:q('.virtual-story-stage'),cards:cards.map(x=>({l:x.left,r:x.right,t:x.top}))}});if(r.sw>width||r.sh>height+1)throw Error(`overflow ${width}x${height}`);if(r.cards.length!==5||Math.max(...r.cards.map(x=>x.t))-Math.min(...r.cards.map(x=>x.t))>1)throw Error(`mano non singola ${width}x${height}`);if(r.cards.some(x=>x.l<0||x.r>width+.5))throw Error(`carta fuori ${width}x${height}`);if(r.table.height>481||r.table.height<173)throw Error(`tavolo ${r.table.height}`);if(r.story.height<95)throw Error('incipit piccolo');if(r.phase.top<r.table.bottom-1||r.hand.top<r.phase.bottom-1||r.hand.top-r.phase.bottom>35)throw Error(`ordine/spazio errato ${width}x${height}: ${r.hand.top-r.phase.bottom}`);if(r.actions.bottom>height+.5)throw Error('azioni fuori');await page.screenshot({path:`v39-final-shots/${width}x${height}.png`});await page.click('[data-open-story]');if(await page.locator('[data-story-modal]').count()!==1)throw Error('storia non apre');await page.close()}const p=await browser.newPage({viewport:{width:390,height:844}});await p.goto('http://127.0.0.1:4173/verify-v39-final.html');await p.click('[data-toggle-cards]');if(await p.locator('.virtual-hand .card-back').count()!==5)throw Error('mancano retri');await p.screenshot({path:'v39-final-shots/390x844-hidden.png'});await browser.close();console.log('Verifica finale v39 completata');
          JS

      - name: Install Chromium
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.55.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null

      - name: Run visual verification
        shell: bash
        run: |
          python3 -m http.server 4173 >/tmp/v39-final-server.log 2>&1 &
          PID=$!
          trap 'kill $PID || true' EXIT
          sleep 2
          node verify-v39-final.mjs

      - name: Upload final screenshots
        uses: actions/upload-artifact@v4
        with:
          name: virtual-cards-v39-final-screenshots
          path: v39-final-shots/*.png
          retention-days: 14

      - name: Commit final spacing
        shell: bash
        run: |
          rm -rf .github/workflows/finalize-v39-spacing.yml scripts/apply-v39-spacing.py verify-v39-final.html verify-v39-final.mjs v39-final-shots node_modules package.json package-lock.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Rifinisce la spaziatura verticale della modalità virtuale'
          git push origin HEAD:agent/virtual-cards-single-row-v39
