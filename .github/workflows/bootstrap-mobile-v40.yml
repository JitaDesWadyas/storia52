name: Bootstrap mobile layout v40

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.head_ref == 'agent/virtual-cards-mobile-layout-v40'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Activate final workflow
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/rebuild-mobile-layout-v40.yml')
          text = path.read_text()
          old = "github.head_ref == 'agent/virtual-cards-single-row-v39'"
          new = "github.head_ref == 'agent/virtual-cards-mobile-layout-v40'"
          if old not in text:
              raise SystemExit('Old branch guard not found')
          path.write_text(text.replace(old, new))
          PY
          rm -f .github/workflows/bootstrap-mobile-v40.yml .github/v40-trigger-2.txt .github/v40-branch-note.txt .github/v40-branch-anchor.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/rebuild-mobile-layout-v40.yml .github/workflows/bootstrap-mobile-v40.yml .github/v40-trigger-2.txt .github/v40-branch-note.txt .github/v40-branch-anchor.txt
          git commit -m "chore: attiva verifica layout mobile v40"
          git push origin HEAD:${{ github.head_ref }}
